# 目的: 週次セキュリティダイジェストを生成して reports/YYYY-WW.md に保存します。
# トリガー: 毎週月曜 00:20 UTC と手動実行です。
# 依存: PAT_TOKEN, .github/scripts/weekly-digest.sh です。
# 想定実行時間: 3〜10分です。
name: Weekly security digest

on:
  schedule:
    - cron: '20 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build weekly digest
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          bash .github/scripts/weekly-digest.sh

      - name: Commit weekly digest
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- reports; then
            echo "変更なし"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports
          git commit -m "docs: update weekly security digest"
          git push
