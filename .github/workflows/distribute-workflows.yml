# このリポジトリに置いた workflows/ 以下の .yml を、同一オーナー配下の全リポジトリへ配布する
name: Distribute workflows

on:
  schedule:
    # 毎週月曜 00:00 UTC = 月曜 09:00 JST
    - cron: '0 0 * * 1'
  workflow_dispatch:

concurrency:
  group: distribute-workflows
  cancel-in-progress: false

jobs:
  distribute:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # GITHUB_TOKEN は checkout の読み取りのみ。他リポへの書き込みは PAT_TOKEN（env の GH_TOKEN）を使用
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Secret scanning 有効化のうえ全リポジトリへワークフローを配布
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::secrets.PAT_TOKEN が未設定です。リポジトリの Secrets に PAT_TOKEN を登録してください。"
            exit 1
          fi

          # 認証ユーザー（個人アカウントのログイン名）
          owner="$(gh api user --jq .login)"
          echo "配布先オーナー: ${owner}"

          # 同一オーナー配下のリポジトリ名一覧（アーカイブは除外）
          mapfile -t repos < <(
            gh repo list "${owner}" \
              --limit 1000 \
              --json name,isArchived \
              --jq -r '.[] | select(.isArchived | not) | .name'
          )

          if [[ "${#repos[@]}" -eq 0 ]]; then
            echo "::warning::対象リポジトリがありませんでした。"
            exit 0
          fi

          # --- Secret scanning / Push protection（無料プラン非対応等で失敗してもジョブは止めない） ---
          set +e
          patch_body="$(
            jq -n '{"security_and_analysis":{"secret_scanning":{"status":"enabled"},"secret_scanning_push_protection":{"status":"enabled"}}}'
          )"
          for repo in "${repos[@]}"; do
            repo_api="https://api.github.com/repos/${owner}/${repo}"
            get_code="$(
              curl -sS -o /tmp/gh_repo_get.json -w '%{http_code}' \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "${repo_api}" 2>/dev/null
            )" || true
            [[ -z "${get_code}" ]] && get_code="000"

            if [[ "${get_code}" == "200" ]]; then
              already="$(
                jq -r '((.security_and_analysis.secret_scanning.status // "") == "enabled") and ((.security_and_analysis.secret_scanning_push_protection.status // "") == "enabled")' \
                  /tmp/gh_repo_get.json 2>/dev/null || echo "false"
              )"
              if [[ "${already}" == "true" ]]; then
                echo "[SECRET SCAN SKIP] ${owner}/${repo} — 既に有効です"
                continue
              fi
            else
              echo "::notice::[SECRET SCAN] ${owner}/${repo} の状態取得に失敗 (HTTP ${get_code})。有効化を試みます"
            fi

            patch_code="$(
              curl -sS -o /tmp/gh_repo_patch.json -w '%{http_code}' \
                -X PATCH \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                -d "${patch_body}" \
                "${repo_api}" 2>/dev/null
            )" || true
            [[ -z "${patch_code}" ]] && patch_code="000"

            if [[ "${patch_code}" == "200" ]]; then
              echo "[SECRET SCAN OK] ${owner}/${repo}"
            else
              echo "::notice::[SECRET SCAN] ${owner}/${repo} の有効化をスキップ (HTTP ${patch_code})"
              if [[ -s /tmp/gh_repo_patch.json ]]; then
                jq -r '.message // "（詳細なし）"' /tmp/gh_repo_patch.json 2>/dev/null || true
              fi
            fi
          done
          set -euo pipefail

          shopt -s nullglob
          workflow_files=(workflows/*.yml)
          shopt -u nullglob

          if [[ "${#workflow_files[@]}" -eq 0 ]]; then
            echo "::error::workflows/*.yml が見つかりません。このリポジトリの workflows/ に .yml を追加してください。"
            exit 1
          fi

          for repo in "${repos[@]}"; do
            for workflow_file in "${workflow_files[@]}"; do
              filename="$(basename "${workflow_file}")"
              api_url="https://api.github.com/repos/${owner}/${repo}/contents/.github/workflows/${filename}"

              # 既にファイルがあるか確認（200 ならスキップ）
              status="$(
                curl -sS -o /dev/null -w '%{http_code}' \
                  -H "Authorization: Bearer ${GH_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  "${api_url}"
              )"

              if [[ "${status}" == "200" ]]; then
                echo "[SKIP] ${owner}/${repo} — ${filename} は既に存在します"
                continue
              fi

              if [[ "${status}" != "404" ]]; then
                echo "::warning::[HTTP ${status}] ${owner}/${repo} / ${filename} の存在確認に失敗したためスキップします"
                continue
              fi

              echo "[ADD] ${owner}/${repo} へ ${filename} を追加します"

              content_b64="$(base64 -w 0 "${workflow_file}")"
              body="$(
                jq -n \
                  --arg msg "chore: add ${filename} (distributed from security-automation)" \
                  --arg c "${content_b64}" \
                  '{message: $msg, content: $c}'
              )"

              http_code="$(
                curl -sS -o /tmp/distribute_response.json -w '%{http_code}' \
                  -X PUT \
                  -H "Authorization: Bearer ${GH_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  "${api_url}" \
                  -d "${body}"
              )"

              if [[ "${http_code}" == "201" ]]; then
                echo "[OK] ${owner}/${repo} / ${filename}"
              else
                echo "::warning::[HTTP ${http_code}] ${owner}/${repo} / ${filename} の追加に失敗しました"
                # API レスポンス全文はログに出さず、メッセージのみ（機密混入リスク低減）
                if [[ -s /tmp/distribute_response.json ]]; then
                  jq -r '.message // "（詳細なし）"' /tmp/distribute_response.json 2>/dev/null \
                    || echo "(エラー本文の解析に失敗)"
                fi
              fi
            done
          done
