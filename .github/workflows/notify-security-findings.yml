# このリポジトリ専用: 全リポの Code Scanning オープンアラートを監視し、Cursor 用プロンプト付き Issue を起票する（配布しない）
name: Notify security findings

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

concurrency:
  group: notify-security-findings
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout（スクリプト取得）
        uses: actions/checkout@v4

      - name: Code Scanning の結果を Issue 化
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${PAT_TOKEN:-}" ]]; then
            echo "::error::secrets.PAT_TOKEN が未設定です。"
            exit 1
          fi
          bash .github/scripts/notify-security-findings.sh
