name: Check Supabase RLS

on:
  schedule:
    # 毎週月曜 00:00 UTC（JST 09:00）
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-rls:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      ISSUE_TITLE: '[Security] RLS未設定のテーブルがあります'
      ISSUE_LABEL: security-auto-fix
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Validate required secrets
        shell: bash
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail
          # 未設定のSecretsをまとめて報告する（どれが欠けているか一度で分かるように）
          missing=()
          [[ -z "${SUPABASE_DB_URL:-}" ]] && missing+=("SUPABASE_DB_URL")
          [[ -z "${PAT_TOKEN:-}" ]] && missing+=("PAT_TOKEN")
          if (( ${#missing[@]} > 0 )); then
            echo "::error::必要なSecretsが未設定です: ${missing[*]}（Settings → Secrets and variables → Actions で登録してください）"
            exit 1
          fi

      - name: Query RLS status for public schema tables
        id: query_rls
        shell: bash
        run: |
          set -euo pipefail
          # public スキーマのユーザーテーブルのみを確認（Supabase内部テーブルは除外）
          # 接続不可（プロジェクト一時停止・到達不可など）はワークフロー失敗にせず警告で
          # 正常終了する（free planは無操作で自動pauseするため）。
          # ただし認証/設定/SQLエラー等は見逃さないよう従来どおり失敗させる。
          set +e
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -At -F '|' -c \
            "SELECT tablename, rowsecurity FROM pg_tables WHERE schemaname = 'public' ORDER BY tablename;" \
            > rls_status.txt 2> psql_err.txt
          status=$?
          set -e
          if [[ $status -ne 0 ]]; then
            # psqlのexit status 2 は接続不良、status 3 は ON_ERROR_STOP 時のSQL/スクリプトエラー。
            # 「一時停止・到達不可」は接続レベル(=status 2)かつpoolerのシグネチャに合致する場合のみ
            # スキップ扱いとし、それ以外（認証ミス・権限/カタログ/SQLエラー等）は fail-fast させる。
            if [[ $status -eq 2 ]] && grep -qiE 'tenant or user not found|tenant/user .* not found|could not translate host name|name or service not known|temporary failure in name resolution|could not connect to server|connection refused|connection timed out|timeout expired|server closed the connection|no route to host' psql_err.txt; then
              echo "reachable=false" >> "$GITHUB_OUTPUT"
              echo "::warning::Supabase DBへ接続できませんでした。プロジェクトが一時停止中の可能性があります（Supabaseダッシュボードでrestoreしてください）。RLSチェックは今回スキップします。"
              echo "--- psql error ---"
              cat psql_err.txt
              exit 0
            fi
            echo "::error::Supabase DBへの問い合わせに失敗しました（認証/設定エラーの可能性。一時停止ではありません）。"
            cat psql_err.txt
            exit "$status"
          fi
          echo "reachable=true" >> "$GITHUB_OUTPUT"

      - name: Build issue body
        id: build_issue
        if: steps.query_rls.outputs.reachable == 'true'
        shell: bash
        run: |
          set -euo pipefail

          rows=""
          while IFS='|' read -r table_name row_security; do
            [[ -z "$table_name" ]] && continue
            if [[ "$row_security" == "f" || "$row_security" == "false" ]]; then
              rows="${rows}| ${table_name} | ❌ 無効 |\n"
            fi
          done < rls_status.txt

          if [[ -z "$rows" ]]; then
            echo "has_disabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          issue_body_file="issue_body.md"
          {
            echo '## RLS未設定テーブル一覧'
            echo ''
            echo '| テーブル名 | RLS状態 |'
            echo '|-----------|---------|'
            printf "%b" "$rows"
            echo ''
            echo '## 対応手順'
            echo ''
            echo '### 1. Supabase管理画面でRLSを有効化'
            echo 'Authentication → Policies → 該当テーブル → Enable RLS'
            echo ''
            echo '### 2. ポリシーを追加'
            echo 'Supabase SQL Editorで以下を実行:'
            echo ''
            echo '```sql'
            echo '-- RLS有効化'
            echo 'ALTER TABLE {tablename} ENABLE ROW LEVEL SECURITY;'
            echo ''
            echo '-- 基本ポリシー: ログインユーザーは自分のデータのみ操作可能'
            echo 'CREATE POLICY "Users can view own data" ON {tablename}'
            echo '  FOR SELECT USING (auth.uid() = user_id);'
            echo ''
            echo 'CREATE POLICY "Users can insert own data" ON {tablename}'
            echo '  FOR INSERT WITH CHECK (auth.uid() = user_id);'
            echo ''
            echo 'CREATE POLICY "Users can update own data" ON {tablename}'
            echo '  FOR UPDATE USING (auth.uid() = user_id);'
            echo ''
            echo 'CREATE POLICY "Users can delete own data" ON {tablename}'
            echo '  FOR DELETE USING (auth.uid() = user_id);'
            echo '```'
            echo ''
            echo '### 3. 確認テスト（SQL Editorで実行）'
            echo ''
            echo '```sql'
            echo "-- テスト: 他人のデータが見えないか"
            echo "set request.jwt.claims = '{\"sub\": \"テスト用UID\"}';"
            echo 'select * from {tablename};'
            echo '-- → 自分のデータのみ返ればOK'
            echo '```'
          } > "$issue_body_file"

          echo "has_disabled=true" >> "$GITHUB_OUTPUT"
          echo "issue_body_file=$issue_body_file" >> "$GITHUB_OUTPUT"

      - name: Create issue when RLS is disabled
        if: steps.query_rls.outputs.reachable == 'true' && steps.build_issue.outputs.has_disabled == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const fs = require('fs');
            const bodyPath = '${{ steps.build_issue.outputs.issue_body_file }}';
            const body = fs.readFileSync(bodyPath, 'utf8');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: process.env.ISSUE_TITLE,
              labels: [process.env.ISSUE_LABEL],
              body
            });
