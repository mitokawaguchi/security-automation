# 目的: 脅威インテル収集と依存トレンド分析を週次実行し、reports/trends/YYYY-WW.md を更新します。
# トリガー: 毎週月曜 00:25 UTC と手動実行です。
# 依存: PAT_TOKEN, threat-intel-scraper.sh, dependency-trend.py です。
# 想定実行時間: 4〜15分です。
name: Trend forecast

on:
  schedule:
    - cron: '25 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve owner
        id: owner
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          echo "value=$(gh api user --jq .login)" >> "$GITHUB_OUTPUT"

      - name: Collect threat intel
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          bash .github/scripts/threat-intel-scraper.sh

      - name: Build dependency trend report
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          GITHUB_OWNER: ${{ steps.owner.outputs.value }}
        run: python3 .github/scripts/dependency-trend.py

      - name: Commit trend reports
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- reports; then
            echo "変更なし"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports
          git commit -m "docs: update weekly threat intel and dependency trends"
          git push
