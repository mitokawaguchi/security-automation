# 目的: DASHBOARD.md を週次で自動更新し、最新の集計値とレポートリンクを反映します。
# トリガー: 毎週月曜 00:40 UTC と手動実行です。
# 依存: PAT_TOKEN, gh, jq, reports/ 配下です。
# 想定実行時間: 2〜6分です。
name: Update dashboard

on:
  schedule:
    - cron: '40 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rebuild dashboard
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          export GH_TOKEN="${PAT_TOKEN}"
          owner="$(gh api user --jq .login)"
          repo="security-automation"

          p0="$(gh issue list --repo "${owner}/${repo}" --state open --search "label:P0" --json number --jq 'length')"
          p1="$(gh issue list --repo "${owner}/${repo}" --state open --search "label:P1" --json number --jq 'length')"
          sec_total="$(gh issue list --repo "${owner}/${repo}" --state open --search "label:security-auto-fix" --json number --jq 'length')"

          latest_digest="$(ls -1 reports/[0-9][0-9][0-9][0-9]-[0-9][0-9].md 2>/dev/null | sort | tail -n 1 || echo N/A)"
          latest_trend="$(ls -1 reports/trends/*.md 2>/dev/null | sort | tail -n 1 || echo N/A)"
          latest_cve="$(ls -1 reports/cve-intel/*.md 2>/dev/null | sort | tail -n 1 || echo N/A)"
          latest_orch="$(ls -1 reports/orchestrator/*.md 2>/dev/null | sort | tail -n 1 || echo N/A)"

          cat > DASHBOARD.md <<EOF
          <!--
          目的: 全リポジトリ横断のセキュリティ状況を一目で把握するためのダッシュボードです。
          トリガー: .github/workflows/update-dashboard.yml により週次または手動で更新します。
          依存: reports 配下の週次レポートと GitHub API 集計です。
          想定実行時間: 更新処理は 1〜3分です。
          -->

          # Security Dashboard

          最終更新: $(date -u '+%Y-%m-%d %H:%M:%S UTC')

          ## 全体ステータス

          - Open P0 Issues: ${p0}
          - Open P1 Issues: ${p1}
          - Open security-auto-fix Issues: ${sec_total}

          ## 今週のトレンド

          - dependency trend report: \`${latest_trend}\`
          - cve intel report: \`${latest_cve}\`
          - orchestrator report: \`${latest_orch}\`

          ## 最新 digest

          - weekly digest: \`${latest_digest}\`
          EOF

      - name: Commit dashboard
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- DASHBOARD.md; then
            echo "変更なし"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add DASHBOARD.md
          git commit -m "docs: update security dashboard"
          git push
