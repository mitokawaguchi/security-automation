# 目的: 配布先リポジトリで履歴を含む秘密情報漏えいを検出します。
# トリガー: push / pull_request / 週次スケジュール / 手動実行です。
# 依存: gitleaks, actions/upload-artifact です。
# 想定実行時間: 2〜8分です。
name: Secret scan

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: '20 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout full history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
          GITLEAKS_CONFIG: ''
