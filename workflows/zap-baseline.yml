# 目的: デプロイ済みプレビューURLに対し OWASP ZAP baseline スキャン（受動）を実行し、結果を artifact 保存します。
# トリガー: 毎週月曜 02:00 UTC の定期実行 + 手動実行です。対象URL未設定のリポは自動スキップ・非ブロッキングです。
# 依存: zaproxy/action-baseline。URL は inputs / Repository Variables / Homepage の順で解決します。
# 想定実行時間: 3〜10分です。
name: ZAP baseline scan

on:
  schedule:
    # 毎週月曜 02:00 UTC = 月曜 11:00 JST（既存 00:00-01:00 UTC 枠と非衝突）
    # 注: 定期実行では Homepage を取得できないため、Repository Variable ZAP_TARGET_URL を
    #     設定したリポのみ実行されます（未設定は resolve ステップで自動スキップ）。
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      target_url:
        description: 'スキャン対象URL（未指定時は Repository Variables の ZAP_TARGET_URL → About の Website を使用）'
        required: false
        type: string

permissions:
  contents: read
  issues: write

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DEFAULT_TARGET_URL: ${{ vars.ZAP_TARGET_URL }}
      REPO_HOMEPAGE_URL: ${{ github.event.repository.homepage }}
    steps:
      - name: Resolve target URL
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          # 手動入力 > Repository Variables > Repository Homepage の順で採用（artillery と同方式）
          target_url="${{ inputs.target_url }}"
          [[ -z "${target_url}" ]] && target_url="${DEFAULT_TARGET_URL:-}"
          [[ -z "${target_url}" ]] && target_url="${REPO_HOMEPAGE_URL:-}"

          if [[ ! "${target_url}" =~ ^https?:// ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::対象URLが未設定のため ZAP baseline をスキップします（inputs.target_url / ZAP_TARGET_URL / About の Website のいずれかを設定してください）。"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "target_url=${target_url}" >> "$GITHUB_OUTPUT"
          echo "対象URL: ${target_url}"

      - name: ZAP baseline (passive, non-blocking)
        if: steps.resolve.outputs.skip == 'false'
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: ${{ steps.resolve.outputs.target_url }}
          # 警告で PR/ジョブを失敗させない（非ブロッキング運用）
          fail_action: false
          allow_issue_writing: false
          cmd_options: '-a'
