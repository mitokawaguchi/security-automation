# 目的: 配布先リポジトリで Trivy により脆弱性を検出し、SARIF を Security タブに連携します。
# トリガー: push / pull_request / 手動実行です。
# 依存: aquasecurity/trivy-action, github/codeql-action/upload-sarif, actions/upload-artifact です。
# 想定実行時間: 2〜10分です。
name: Trivy filesystem scan

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    name: Trivy FS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy（fs / CRITICAL,HIGH / table）
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: table

      - name: Trivy（fs / CRITICAL,HIGH / sarif）
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-results.sarif

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy-results.sarif
