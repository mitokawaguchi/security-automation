# 目的: 配布先リポジトリで SBOM を生成し、Grype で CVE を評価します。
# トリガー: push / pull_request / 週次スケジュール / 手動実行です。
# 依存: anchore/sbom-action, anchore/scan-action, actions/upload-artifact です。
# 想定実行時間: 4〜12分です。
name: SBOM generate and scan

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: '25 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  sbom-and-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@f325610c9f50a54015d37c8d16cb3b0e2c8f4de0 # v0.18.0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Scan SBOM with Grype
        id: grype_scan
        uses: anchore/scan-action@1638637db639e0ade3258b51db49a9a137574c3e # v6.5.1
        with:
          sbom: sbom.cdx.json
          fail-build: false
          severity-cutoff: high

      - name: Upload SBOM and Grype report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-and-grype
          path: |
            sbom.cdx.json
            ${{ steps.grype_scan.outputs.sarif }}

      - name: Upload Grype SARIF
        if: steps.grype_scan.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: ${{ steps.grype_scan.outputs.sarif }}
