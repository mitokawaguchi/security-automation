# 目的: Next.js リポジトリの PR で、サーバ専用の機密がクライアントバンドルへ露出する変更をブロックします。
# トリガー: pull_request / 手動実行です。
# 依存: bash, grep（追加ツール不要）。Next.js 以外のリポでは自動的にスキップします。
# 想定実行時間: 1〜2分です。
name: Next.js client-secret guard (PR gate)

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nextjs-secret-guard:
    name: Next.js secret guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Detect Next.js project
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          is_next="false"
          if ls next.config.* >/dev/null 2>&1; then
            is_next="true"
          elif [[ -f package.json ]] && grep -Eq '"next"[[:space:]]*:' package.json; then
            is_next="true"
          fi
          echo "is_next=${is_next}" >> "$GITHUB_OUTPUT"
          if [[ "${is_next}" == "true" ]]; then
            echo "Next.js プロジェクトを検出しました。クライアント機密露出ガードを実行します。"
          else
            echo "::notice::Next.js プロジェクトではないため、このゲートをスキップします。"
          fi

      - name: Scan for client-exposed secrets
        if: steps.detect.outputs.is_next == 'true'
        shell: bash
        run: |
          set -uo pipefail
          # 走査対象を限定（node_modules / ビルド成果物 / .git は除外）
          mapfile -t targets < <(
            find . \
              \( -path ./node_modules -o -path ./.next -o -path ./dist -o -path ./build -o -path ./.git \) -prune \
              -o -type f \( \
                -name '*.ts' -o -name '*.tsx' -o -name '*.js' -o -name '*.jsx' \
                -o -name '*.mjs' -o -name '*.cjs' -o -name '.env*' \
              \) -print
          )
          if [[ "${#targets[@]}" -eq 0 ]]; then
            echo "走査対象ファイルがありません。"
            exit 0
          fi

          violations=0

          # 機密を示唆する語（NEXT_PUBLIC_ に付くとブラウザへ確実に露出する）
          secretish='SECRET|PRIVATE|PASSWORD|PASSWD|TOKEN|API_?KEY|ACCESS_?KEY|CLIENT_SECRET|SERVICE_ROLE|CREDENTIAL'

          # 検査1: NEXT_PUBLIC_ かつ機密語を含む変数名（= クライアントへ機密が露出）
          # 値はログに出さないよう、キー部分（= より前）のみ表示する。
          echo "== 検査1: NEXT_PUBLIC_*<機密語> の定義/参照 =="
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            # 形式: path:lineno:matched  → matched から値を除去
            file_and_no="${line%%:*}:$(echo "$line" | cut -d: -f2)"
            key="$(echo "$line" | cut -d: -f3- | sed -E 's/[=:].*$//' | tr -d ' "'\''')"
            echo "  [NG] ${file_and_no} → ${key} ..."
            violations=$((violations + 1))
          done < <(grep -rEn "NEXT_PUBLIC_[A-Za-z0-9_]*(${secretish})" "${targets[@]}" 2>/dev/null || true)

          # 検査2: クライアントコンポーネント('use client')でサーバ専用の機密 env を参照
          echo "== 検査2: 'use client' 内での process.env.<非NEXT_PUBLIC機密> 参照 =="
          for f in "${targets[@]}"; do
            case "$f" in *.env*) continue;; esac
            head -5 "$f" 2>/dev/null | grep -Eq "['\"]use client['\"]" || continue
            while IFS= read -r m; do
              [[ -z "$m" ]] && continue
              lineno="$(echo "$m" | cut -d: -f1)"
              var="$(echo "$m" | sed -E 's/.*process\.env\.([A-Za-z0-9_]+).*/\1/')"
              # NEXT_PUBLIC_ は意図的な公開値なので除外。機密語を含む変数のみ NG。
              if [[ "$var" != NEXT_PUBLIC_* ]] && echo "$var" | grep -Eq "(${secretish})"; then
                echo "  [NG] ${f}:${lineno} → process.env.${var}（クライアントから機密 env を参照）"
                violations=$((violations + 1))
              fi
            done < <(grep -En 'process\.env\.[A-Za-z0-9_]+' "$f" 2>/dev/null || true)
          done

          echo "-----"
          if [[ "${violations}" -gt 0 ]]; then
            echo "::error::クライアントへ露出し得る機密の参照を ${violations} 件検出しました。NEXT_PUBLIC_ への機密代入、または 'use client' での機密 env 参照を解消してください。"
            exit 1
          fi
          echo "クライアント機密露出は検出されませんでした。"
